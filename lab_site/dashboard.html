<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Intelligence | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <aside>
        <h2 class="dash-title">Nexus<span class="text-primary">Intel</span></h2>
        <div class="label">Live Data Stream</div>
        <div id="session-list">
        </div>
        <button type="button" class="btn-refresh" onclick="fetchData()">REFRESH CLUSTERS</button>
    </aside>

    <main>
        <h1>Behavioral Analysis Overview</h1>

        <div class="grid">
            <div class="stat-card">
                <div class="label">Behavioral Cloud (Clustering)</div>
                <div class="chart-container">
                    <canvas id="cloudChart"></canvas>
                </div>
            </div>
            <div class="stat-card">
                <div class="label">Archetype Radar (Selected User)</div>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="stat-card stat-card--extra-top">
            <div class="label">Engagement Velocity vs. Friction</div>
            <div class="chart-container">
                <canvas id="velocityChart"></canvas>
            </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
