<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Intelligence | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b;
            --primary: #6366f1; --text: #f8fafc;
            --muted: #94a3b8; --border: #334155;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        aside { width: 300px; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        main { flex: 1; padding: 40px; overflow-y: auto; }

        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        
        h1, h2 { margin: 0 0 20px 0; letter-spacing: -0.02em; }
        .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        
        .chart-container { height: 300px; position: relative; }
        #session-list { flex: 1; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .session-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .session-item:hover { background: var(--border); }
    </style>
</head>
<body>

    <aside>
        <h2>Nexus<span style="color:var(--primary)">Intel</span></h2>
        <div class="label">Live Data Stream</div>
        <div id="session-list">
            </div>
        <button onclick="fetchData()" style="margin-top: 20px; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;">REFRESH CLUSTERS</button>
    </aside>

    <main>
        <h1>Behavioral Analysis Overview</h1>
        
        <div class="grid">
            <div class="stat-card">
                <div class="label">Behavioral Cloud (Clustering)</div>
                <div class="chart-container">
                    <canvas id="cloudChart"></canvas>
                </div>
            </div>
            <div class="stat-card">
                <div class="label">Archetype Radar (Selected User)</div>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="stat-card" style="margin-top: 24px;">
            <div class="label">Engagement Velocity vs. Friction</div>
            <div class="chart-container">
                <canvas id="velocityChart"></canvas>
            </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
