<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Equal search field and category browse, same goal">
  <defs>
    <linearGradient id="lb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="0.35" stop-color="#e0e7ff"/>
      <stop offset="0.7" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="lbs" x="-2%" y="-2%" width="105%" height="105%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312e81" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#lb)"/>
  <text x="600" y="100" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="800" fill="#4f46e5" letter-spacing="0.18em" text-transform="uppercase">Find: Aurora cable</text>
  <g transform="translate(600, 165)" filter="url(#lbs)">
    <rect x="-400" y="0" width="800" height="280" rx="18" fill="#fff" stroke="#c4b5fd" stroke-width="0.4"/>
  </g>
  <g transform="translate(190, 185)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="800" fill="#4f46e5" letter-spacing="0.15em" text-transform="uppercase">Search</text>
    <rect x="0" y="10" width="300" height="40" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.6"/>
    <g transform="translate(8, 22)">
      <circle cx="9" cy="8" r="5" fill="none" stroke="#4f46e5" stroke-width="1.4"/>
      <line x1="12.5" y1="12.5" x2="16" y2="16" stroke="#4f46e5" stroke-width="1.3" stroke-linecap="round"/>
    </g>
    <text x="28" y="36" font-family="ui-sans-serif,monospace" font-size="8" font-weight="500" fill="#94a3b8" letter-spacing="0.04em">aur, cable, …</text>
    <rect x="320" y="10" width="64" height="40" rx="6" fill="#4f46e5"/>
    <text x="352" y="36" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff" letter-spacing="0.1em" text-transform="uppercase">Go</text>
  </g>
  <g font-family="ui-sans-serif,system-ui,sans-serif" transform="translate(560, 228)">
    <rect x="0" y="0" width="80" height="32" rx="7" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="40" y="21" text-anchor="middle" font-size="7" font-weight="800" fill="#6366f1" letter-spacing="0.15em" text-transform="uppercase">or</text>
  </g>
  <g transform="translate(700, 185)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="800" fill="#4f46e5" letter-spacing="0.15em" text-transform="uppercase">Browse</text>
    <g transform="translate(0, 8)">
      <rect y="0" x="0" width="300" height="40" rx="6" fill="#f5f3ff" stroke="#4f46e5" stroke-width="1.2"/>
      <text y="25" x="20" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="600" fill="#1e1b4b">Cables &amp; power</text>
    </g>
    <g transform="translate(0, 60)">
      <rect y="0" x="0" width="300" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text y="25" x="20" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="500" fill="#334155">Lighting</text>
    </g>
    <g transform="translate(0, 112)">
      <rect y="0" x="0" width="300" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text y="25" x="20" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="500" fill="#334155">Desks</text>
    </g>
  </g>
  <text x="600" y="500" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="500" fill="#94a3b8">Both reach the same demo item; first action is the signal in the lab.</text>
  <line x1="200" y1="530" x2="1000" y2="530" stroke="#e0e7ff" stroke-width="0.4"/>
  <text x="600" y="575" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="0.2em" text-transform="uppercase">Search &amp; browse</text>
</svg>
