<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="A fact card and a confidence scale, stylized for calibration">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0e7ff"/>
      <stop offset="0.4" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#cb-bg)"/>
  <text x="600" y="160" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#4f46e5" letter-spacing="0.12em" text-transform="uppercase">Statement</text>
  <rect x="300" y="198" width="600" height="88" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.4"/>
  <g fill="none" stroke="#cbd5e1" stroke-width="0.85" stroke-linecap="round" opacity="0.85">
    <line x1="330" y1="232" x2="600" y2="232"/>
    <line x1="330" y1="256" x2="560" y2="256"/>
  </g>
  <g transform="translate(0,0)">
    <rect x="300" y="320" width="150" height="50" rx="6" fill="#f8fafc" stroke="#a5b4fc" stroke-width="1.2"/>
    <text x="375" y="352" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#4f46e5">T</text>
    <rect x="470" y="320" width="150" height="50" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="545" y="352" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#4f46e5">F</text>
  </g>
  <text x="600" y="450" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.1em" text-transform="uppercase">How sure are you?</text>
  <g>
    <rect x="300" y="470" width="90" height="32" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="345" y="491" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600" fill="#475569">~50%</text>
    <rect x="400" y="470" width="90" height="32" rx="4" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="445" y="491" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600" fill="#475569">~70%</text>
    <rect x="500" y="470" width="90" height="32" rx="4" fill="#c7d2fe" stroke="#6366f1"/>
    <text x="545" y="491" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="600" fill="#312e81">~90%</text>
  </g>
  <text x="600" y="550" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="0.2em" text-transform="uppercase">Judgment &amp; calibration</text>
</svg>
