<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Fictional product page: demo hero, three trust pills, and default on">
  <defs>
    <linearGradient id="ptb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.45" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="ptc" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#ptb)"/>
  <g filter="url(#ptc)">
    <rect x="120" y="90" width="960" height="420" rx="20" fill="#fff" stroke="#c4b5fd" stroke-width="0.5"/>
  </g>
  <g transform="translate(170, 120)">
    <rect x="0" y="0" width="400" height="300" rx="12" fill="#e2e8f0" stroke="#cbd5e1"/>
    <g transform="translate(200, 150)">
      <rect x="-3" y="0" width="6" height="100" fill="#4f46e5" rx="0.5"/>
      <ellipse cx="0" cy="0" rx="52" ry="6" fill="#4f46e5"/>
      <path d="M -28 0 Q 0 -40 28 0" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.88"/>
    </g>
  </g>
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <g transform="translate(640, 128)">
      <text x="0" y="0" font-size="24" font-weight="800" fill="#0f172a" letter-spacing="-0.04em">Lumina S1</text>
      <text x="0" y="32" font-size="11" font-weight="600" fill="#16a34a" letter-spacing="0.1em" text-transform="uppercase">In stock  ·  free ship (demo)</text>
      <text x="0" y="80" font-size="36" font-weight="800" fill="#1e1b4b" font-feature-settings="tnum">$49.00</text>
      <text x="0" y="120" font-size="14" fill="#ca8a04" font-weight="700">&#9733;&#9733;&#9733;&#9733;&#9734;</text>
      <text x="118" y="120" font-size="12" font-weight="600" fill="#64748b" dominant-baseline="middle">4.7  ·  208 reviews (demo)</text>
    </g>
  </g>
  <g font-family="ui-sans-serif,system-ui,sans-serif" transform="translate(640, 300)">
    <rect x="0" y="0" width="100" height="32" rx="6" fill="#f5f3ff" stroke="#a5b4fc"/>
    <text x="50" y="22" text-anchor="middle" font-size="8" font-weight="700" fill="#4f46e5" letter-spacing="0.1em" text-transform="uppercase">Warranty</text>
    <rect x="120" y="0" width="100" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="170" y="22" text-anchor="middle" font-size="8" font-weight="600" fill="#64748b" letter-spacing="0.1em" text-transform="uppercase">Privacy</text>
    <rect x="240" y="0" width="100" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="290" y="22" text-anchor="middle" font-size="8" font-weight="600" fill="#64748b" letter-spacing="0.1em" text-transform="uppercase">Price</text>
  </g>
  <g transform="translate(650, 358)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#4f46e5"/>
    <path d="M2.4 5.4 L4.6 7.4 L9.2 2.8" fill="none" stroke="#fff" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="672" y="368" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="500" fill="#334155">Add-on default (demo, checked)</text>
  <line x1="150" y1="505" x2="1050" y2="505" stroke="#c7d2fe" stroke-width="0.45" opacity="0.75"/>
  <text x="600" y="565" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="0.25em" text-transform="uppercase">Social &amp; risk</text>
</svg>
