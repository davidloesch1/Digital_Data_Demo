<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Stylized document and reading path">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="0.5" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="r-sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#r-bg)"/>
  <!-- “page” with lines -->
  <g filter="url(#r-sh)">
    <rect x="300" y="100" width="600" height="450" rx="6" fill="#fff" stroke="#c7d2fe" stroke-width="1.2"/>
  </g>
  <g fill="none" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <line x1="340" y1="150" x2="820" y2="150"/>
    <line x1="340" y1="185" x2="800" y2="185"/>
    <line x1="340" y1="220" x2="780" y2="220"/>
    <line x1="340" y1="255" x2="810" y2="255"/>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="0.9" stroke-linecap="round" opacity="0.5">
    <line x1="340" y1="310" x2="750" y2="310"/>
    <line x1="340" y1="345" x2="770" y2="345"/>
    <line x1="340" y1="380" x2="700" y2="380"/>
  </g>
  <circle cx="380" cy="200" r="2.2" fill="#4f46e5"/>
  <path d="M 390 200 Q 500 198 600 255 T 780 300" fill="none" stroke="#4f46e5" stroke-width="1.6" stroke-linecap="round" opacity="0.45" stroke-dasharray="5 4"/>
  <text x="600" y="615" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="0.2em" text-transform="uppercase">Reading and retention</text>
</svg>
