<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Three product-style tiles, one selected">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0e7ff"/>
      <stop offset="0.4" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#c-bg)"/>
  <!-- unselected left -->
  <g>
    <rect x="200" y="200" width="200" height="250" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.3"/>
    <g fill="none" stroke="#cbd5e1" stroke-width="0.85" stroke-linecap="round">
      <line x1="224" y1="236" x2="360" y2="236"/>
      <line x1="224" y1="270" x2="340" y2="270"/>
    </g>
  </g>
  <!-- selected center -->
  <g>
    <rect x="500" y="188" width="200" height="250" rx="10" fill="#fff" fill-opacity="0.95" stroke="#4f46e5" stroke-width="2.2" filter="drop-shadow(0 4px 14px rgba(79,70,229,0.25))"/>
    <circle cx="650" cy="220" r="6" fill="#4f46e5"/>
    <g fill="none" stroke="#6366f1" stroke-width="1" stroke-linecap="round" opacity="0.75">
      <line x1="520" y1="252" x2="660" y2="252"/>
      <line x1="520" y1="286" x2="635" y2="286"/>
    </g>
    <text x="600" y="355" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="800" fill="#4f46e5" letter-spacing="0.15em" text-transform="uppercase">Shortlist</text>
  </g>
  <!-- unselected right -->
  <g>
    <rect x="800" y="200" width="200" height="250" rx="10" fill="#fff" stroke="#c7d2fe" stroke-width="1.3"/>
    <g fill="none" stroke="#cbd5e1" stroke-width="0.85" stroke-linecap="round">
      <line x1="824" y1="236" x2="960" y2="236"/>
      <line x1="824" y1="270" x2="920" y2="270"/>
    </g>
  </g>
  <text x="600" y="550" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="0.2em" text-transform="uppercase">Compare and choose</text>
</svg>
