# Local: Postgres + collector in DB-only mode (no persistent disk volume for JSONL).
# Usage: docker compose up --build
# Console UI (optional): cd lab_console && npm run build && npx serve . -p 4173
# Use lab_console/.env.example + npm run build, or inline NEXUS_* before scripts.
#
# Create an org + key from host (DB listens on localhost:5433):
#   cd collector && npm install && DATABASE_URL=postgresql://nexus:nexus@127.0.0.1:5433/nexus PUBLISHABLE_KEY_PEPPER=dev-pepper node scripts/create-org.js demo "Demo"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5433:5432"
    volumes:
      - nexus-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 3s
      timeout: 5s
      retries: 15

  collector:
    build: ./collector
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      WAREHOUSE_PATH: /tmp/warehouse.jsonl
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus
      PUBLISHABLE_KEY_PEPPER: dev-pepper-change-in-production
      # Required for /internal/admin/ portal + /internal/v1/* HTTP API (use a long random value in production).
      INTERNAL_ADMIN_TOKEN: dev-admin-token-change-me
      DISABLE_LEGACY_FILE_WAREHOUSE: "true"
      # Comma-separated origins for browser clients (static site URLs). Omit or * for permissive dev CORS.
      # CORS_ORIGINS: "http://localhost:4173,https://your-app.netlify.app"

volumes:
  nexus-pg:
